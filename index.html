<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff3f7d">
    <title>Feliz Dia das Mães 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="stars">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="floating-elements">
        <span>❤</span>
        <span>🌸</span>
        <span>💖</span>
        <span>🌷</span>
        <span>💐</span>
        <span>❤</span>
        <span>🌺</span>
        <span>💞</span>
        <span>🌹</span>
        <span>✨</span>
    </div>
    <div class="rings ring-1"></div>
    <div class="rings ring-2"></div>
    <main class="container">
        <div class="card-wrapper">
            <div class="card" id="card">
                <div class="shine"></div>
                <section class="side front">
                    <div class="tag">
                        ✨ Para Bianca ✨
                    </div>
                    <h1>
                        Feliz Dia<br>
                        das Mães 💐
                    </h1>
                    <p>
                        Você merece todo amor,
                        carinho e felicidade do mundo.
                    </p>
                    <button id="openBtn">
                        Abrir Mensagem
                    </button>
                </section>
                <section class="side back">
                    <h2>
                        Para a melhor mãe 💞
                    </h2>
                    <div class="message-wrapper">
                        <p id="typingText"></p>
                    </div>
                    <div class="bottom-area">
                        <div class="heart">
                            ♥️
                        </div>
                        <button id="backBtn">
                            Voltar
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
