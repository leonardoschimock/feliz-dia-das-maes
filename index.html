<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Dia das Mães ❤️</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet"/>
</head>

<body>
    <div class="particles">
        <div class="romantic-bg">
            <span class="heart-float">❤</span>
            <span class="heart-float">❤</span>
            <span class="heart-float">❤</span>
            <span class="heart-float">❤</span>
            <span class="heart-float">❤</span>
            <span class="heart-float">❤</span>
            <div class="flower flower1">🌹</div>
            <div class="flower flower2">🌸</div>
            <div class="flower flower3">💐</div>
            <div class="flower flower4">🌺</div>
        </div>
    </div>

    <main class="container">
    <div class="card" id="card">
        <div class="front side">
            <h1>Feliz Dia das Mães 💐</h1>
            <p class="subtitle">Você merece o mundo inteiro.</p>
            <button id="openBtn">Abrir Mensagem</button>
        </div>
        <div class="back side">
            <h2>Para a melhor mãe ❤️</h2>
            <p id="typingText"></p>
            <div class="heart">❤️</div>
            <button id="backBtn">Voltar</button>
        </div>
    </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
